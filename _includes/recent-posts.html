<section class="recent-posts">
  <h2>Recent writing</h2>
  {%- assign latest = site.posts | slice: 0, 3 -%}
  {%- for p in latest -%}
    <div class="recent-post-row">
      <span class="date">{{ p.date | date: "%Y-%m-%d" }}</span>
      <span>
        <a class="title" href="{{ p.url | relative_url }}">{{ p.title }}</a>
        <span class="lane lane-{{ p.lane }}">{{ p.lane }}</span>
      </span>
    </div>
  {%- endfor -%}
  <p style="margin-top: 1rem;"><a href="{{ '/blog/' | relative_url }}">All posts →</a></p>
</section>
